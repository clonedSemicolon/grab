name: CIntent CallGraph

on:
  workflow_dispatch:
    inputs:
      database_enabled:
        description: "Enable database backends (redis, mongodb, mysql, postgresql)"
        type: boolean
        default: false
      network_service:
        description: "Network service for non-database tests"
        type: string
        default: "threaded"
      grab_transport:
        description: "Grab transport"
        type: string
        default: "urllib3"

jobs:
  callgraph:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      # ── Original project setup (same as test-action) ─────────
      - name: Install deps
        run: pip install -U -r requirements_dev.txt

      - name: Install deps to build pycurl
        run: sudo apt-get update && sudo apt-get install -y libcurl4-openssl-dev libssl-dev

      - name: Install database deps
        if: ${{ inputs.database_enabled }}
        run: pip install -r requirements_dev_backend.txt

      - name: Build wheel and install
        shell: pwsh
        run: |
          make build
          mv grab backup_grab
          mv dist/*.whl dist/grab-0.0.1-py2.py3-none-any.whl
          pip install -U "grab[urllib3,pyquery] @ file://$(pwd)/dist/grab-0.0.1-py2.py3-none-any.whl"

      - name: Prepare database connection config
        if: ${{ inputs.database_enabled }}
        run: cp test_settings_github.py test_settings.py

      # ── CIntent profiling ────────────────────────────────────
      - uses: clonedSemicolon/setup-cintent@main

      - name: Run all tests (with database)
        if: ${{ inputs.database_enabled }}
        run: |
          python runtest.py --test-all \
            --network-service=${{ inputs.network_service }} \
            --grab-transport=${{ inputs.grab_transport }} \
            --backend-redis --backend-mongodb \
            --backend-mysql --backend-postgresql

      - name: Run all tests (no database)
        if: ${{ !inputs.database_enabled }}
        run: |
          python runtest.py --test-all \
            --network-service=${{ inputs.network_service }} \
            --grab-transport=${{ inputs.grab_transport }}

      - name: Upload CIntent Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cintent-grab-${{ inputs.network_service }}-${{ inputs.grab_transport }}
          path: ${{ env.CINTENT_LOGS }}
          retention-days: 30
