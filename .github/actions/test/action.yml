name: test-action

inputs:
  python:
    type: string
    required: true
  database_enabled:
    type: boolean
    required: true
  os:
    type: string
    required: true
  network_service:
    type: string
    required: true
  grab_transport:
    type: string
    required: true

runs:
  using: "composite"
  steps:
    - uses: actions/checkout@v4

    - name: Install python ${{ inputs.python }} with LisardByte/setup_python action
      if: ${{ inputs.python == '2.7' }}
      uses: LizardByte/actions/actions/setup_python@master
      with:
        python-version: ${{ inputs.python }}

    - name: Install python ${{ inputs.python }} with standard setup-python action
      if: ${{ inputs.python  != '2.7' }}
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"

    - name: Install deps
      shell: bash
      run: |
        pip install -U -r requirements_dev.txt

    - name: Install deps to build pycurl
      if: ${{ inputs.os == 'ubuntu-latest' }}
      shell: bash
      run: |
        sudo apt install libcurl4-openssl-dev libssl-dev

    - name: Install database deps
      if: ${{ fromJSON(inputs.database_enabled) }}
      shell: bash
      run: |
        pip install -r requirements_dev_backend.txt

    - name: Build wheel and install
      shell: pwsh
      run: |
        make build
        mv grab backup_grab
        mv dist/*.whl dist/grab-0.0.1-py2.py3-none-any.whl
        pip install -U "grab[urllib3,pyquery] @ file://$(pwd)/dist/grab-0.0.1-py2.py3-none-any.whl"

    - name: Prepare database connection config
      if: ${{ fromJSON(inputs.database_enabled) }}
      shell: bash
      run: |
        cp test_settings_github.py test_settings.py

    - name: Install DynaPyt
      shell: bash
      run: pip install libcst git+https://github.com/sola-st/DynaPyt.git

    - name: Instrument grab with DynaPyt
      shell: bash
      run: |
        python -m dynapyt.run_instrumentation \
          --directory tests/ \
          --analysis dynapyt.analyses.CallGraph.CallGraph

    - name: Fix CallGraph logging
      shell: bash
      run: |
        python -c "import dynapyt.analyses.CallGraph as m; p=m.__file__; t=open(p).read(); t=t.replace('logging.basicConfig(','logging.basicConfig(force=True, '); open(p,'w').write(t)"

    - name: Run DynaPyt analysis (with database)
      if: ${{ fromJSON(inputs.database_enabled) }}
      shell: bash
      run: |
        echo 'import pytest; pytest.main(["--import-mode=importlib", "--timeout=300", "--backend-redis", "--backend-mongodb", "--backend-mysql", "--backend-postgresql", "tests/"])' > run_tests_dynapyt.py
        python -m dynapyt.run_analysis \
          --entry run_tests_dynapyt.py \
          --analysis dynapyt.analyses.CallGraph.CallGraph

    - name: Run DynaPyt analysis (no database)
      if: ${{ ! fromJSON(inputs.database_enabled) }}
      shell: bash
      run: |
        echo 'import pytest; pytest.main(["--import-mode=importlib", "--timeout=300", "tests/"])' > run_tests_dynapyt.py
        python -m dynapyt.run_analysis \
          --entry run_tests_dynapyt.py \
          --analysis dynapyt.analyses.CallGraph.CallGraph

    - name: Collect DynaPyt output
      if: always()
      shell: bash
      run: |
        mkdir -p dynapyt-output
        # The call graph is written to dynapyt.json in the working directory
        cp dynapyt.json dynapyt-output/ 2>/dev/null || true
        # Also grab any output from dynapyt_output/ folder
        cp -r dynapyt_output/ dynapyt-output/dynapyt_output 2>/dev/null || true
        echo "=== Artifacts collected ==="
        ls -la dynapyt-output/
        echo "=== dynapyt.json size ==="
        wc -c dynapyt-output/dynapyt.json 2>/dev/null || echo "dynapyt.json not found or empty"

    - name: Upload DynaPyt artifacts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: dynapyt-results-${{ inputs.python }}-${{ inputs.os }}-${{ inputs.network_service }}-${{ inputs.grab_transport }}-db${{ inputs.database_enabled }}
        path: dynapyt-output/
        retention-days: 30
